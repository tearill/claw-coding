<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React Hooks - useState 与 useEffect</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh; padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 2.5rem; }
    .demo-grid { 
      display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }
    .demo-card {
      background: white; border-radius: 16px; padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }
    .demo-card h2 { 
      color: #333; font-size: 1.2rem; margin-bottom: 16px;
      padding-bottom: 12px; border-bottom: 2px solid #f0f0f0;
    }
    .counter-demo { text-align: center; }
    .counter-value { 
      font-size: 4rem; font-weight: bold; color: #667eea;
      margin: 20px 0;
    }
    .btn {
      padding: 12px 24px; margin: 4px; border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer; transition: all 0.3s;
    }
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5568d3; transform: translateY(-2px); }
    .btn-danger { background: #f56565; color: white; }
    .btn-danger:hover { background: #e53e3e; }
    .btn-secondary { background: #edf2f7; color: #333; }
    .btn-secondary:hover { background: #e2e8f0; }
    .input-field {
      width: 100%; padding: 12px; margin: 10px 0;
      border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1rem;
    }
    .input-field:focus { outline: none; border-color: #667eea; }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px; margin: 8px 0; background: #f7fafc; border-radius: 8px;
    }
    .todo-item.completed { text-decoration: line-through; opacity: 0.6; }
    .clock-display {
      text-align: center; font-size: 3rem; color: #667eea;
      font-family: 'Courier New', monospace; margin: 20px 0;
    }
    .mouse-pos { 
      text-align: center; padding: 20px; background: #f7fafc; 
      border-radius: 8px; font-family: monospace;
    }
    .effect-log {
      max-height: 200px; overflow-y: auto; background: #1a202c;
      color: #68d391; padding: 16px; border-radius: 8px; font-family: monospace;
      font-size: 0.9rem;
    }
    .api-demo { background: #f7fafc; padding: 16px; border-radius: 8px; }
    .api-demo pre { overflow-x: auto; }
    .user-card {
      display: flex; align-items: center; gap: 16px;
      padding: 16px; background: #f7fafc; border-radius: 8px;
    }
    .user-avatar {
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 1.5rem; font-weight: bold;
    }
    .tab-buttons { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 12px; border: none; background: #edf2f7;
      cursor: pointer; border-radius: 8px; transition: all 0.3s;
    }
    .tab-btn.active { background: #667eea; color: white; }
    .code-section { margin-top: 20px; }
    .code-section h3 { color: #333; margin-bottom: 12px; }
    .code-block {
      background: #1a202c; color: #e2e8f0; padding: 16px;
      border-radius: 8px; overflow-x: auto; font-family: 'Courier New', monospace;
      font-size: 0.9rem; line-height: 1.6;
    }
    .keyword { color: #f56565; }
    .function { color: #68d391; }
    .string { color: #f6ad55; }
    .comment { color: #718096; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 示例1: 基础计数器
    function Counter() {
      const [count, setCount] = useState(0);
      
      return (
        <div className="counter-demo">
          <h2>示例1: 基础计数器</h2>
          <div className="counter-value">{count}</div>
          <button className="btn btn-primary" onClick={() => setCount(count + 1)}>
            +1
          </button>
          <button className="btn btn-secondary" onClick={() => setCount(0)}>
            重置
          </button>
          <p style={{marginTop: 16, color: '#666'}}>
            useState 创建状态，setCount 更新状态
          </p>
        </div>
      );
    }

    // 示例2: 函数式更新
    function CounterFunctional() {
      const [count, setCount] = useState(0);
      
      // 函数式更新：基于前一个状态计算新状态
      const increment = () => setCount(prev => prev + 1);
      const decrement = () => setCount(prev => prev - 1);
      const incrementBy5 = () => setCount(prev => prev + 5);
      
      return (
        <div className="counter-demo">
          <h2>示例2: 函数式更新</h2>
          <div className="counter-value">{count}</div>
          <button className="btn btn-primary" onClick={increment}>+1</button>
          <button className="btn btn-danger" onClick={decrement}>-1</button>
          <button className="btn btn-primary" onClick={incrementBy5}>+5</button>
          <p style={{marginTop: 16, color: '#666'}}>
            使用 prev => prev + n 确保状态更新的准确性
          </p>
        </div>
      );
    }

    // 示例3: 表单输入
    function FormExample() {
      const [name, setName] = useState('');
      const [email, setEmail] = useState('');
      
      const handleSubmit = (e) => {
        e.preventDefault();
        alert(`提交: ${name}, ${email}`);
      };
      
      return (
        <div>
          <h2>示例3: 受控表单</h2>
          <form onSubmit={handleSubmit}>
            <input
              className="input-field"
              type="text"
              placeholder="请输入姓名"
              value={name}
              onChange={(e) => setName(e.target.value)}
            />
            <input
              className="input-field"
              type="email"
              placeholder="请输入邮箱"
              value={email}
              onChange={(e) => setEmail(e.target.value)}
            />
            <button className="btn btn-primary" type="submit" style={{width: '100%'}}>
              提交
            </button>
          </form>
          <div style={{marginTop: 16, padding: 12, background: '#f7fafc', borderRadius: 8}}>
            <strong>实时预览：</strong>
            <p>姓名: {name || '（未输入）'}</p>
            <p>邮箱: {email || '（未输入）'}</p>
          </div>
        </div>
      );
    }

    // 示例4: Todo List
    function TodoList() {
      const [todos, setTodos] = useState([
        { id: 1, text: '学习 React Hooks', completed: true },
        { id: 2, text: '完成练习代码', completed: false },
      ]);
      const [newTodo, setNewTodo] = useState('');
      
      const addTodo = () => {
        if (!newTodo.trim()) return;
        setTodos([...todos, { id: Date.now(), text: newTodo, completed: false }]);
        setNewTodo('');
      };
      
      const toggleTodo = (id) => {
        setTodos(todos.map(todo => 
          todo.id === id ? { ...todo, completed: !todo.completed } : todo
        ));
      };
      
      const deleteTodo = (id) => {
        setTodos(todos.filter(todo => todo.id !== id));
      };
      
      return (
        <div>
          <h2>示例4: Todo List</h2>
          <div style={{display: 'flex', gap: 8}}>
            <input
              className="input-field"
              style={{flex: 1, margin: 0}}
              placeholder="添加新任务"
              value={newTodo}
              onChange={(e) => setNewTodo(e.target.value)}
              onKeyPress={(e) => e.key === 'Enter' && addTodo()}
            />
            <button className="btn btn-primary" onClick={addTodo}>添加</button>
          </div>
          <ul className="todo-list">
            {todos.map(todo => (
              <li key={todo.id} className={`todo-item ${todo.completed ? 'completed' : ''}`}>
                <span onClick={() => toggleTodo(todo.id)} style={{cursor: 'pointer', flex: 1}}>
                  {todo.text}
                </span>
                <button className="btn btn-danger" onClick={() => deleteTodo(todo.id)}>
                  删除
                </button>
              </li>
            ))}
          </ul>
        </div>
      );
    }

    // 示例5: 时钟
    function Clock() {
      const [time, setTime] = useState(new Date());
      
      useEffect(() => {
        // 每秒更新一次时间
        const timer = setInterval(() => {
          setTime(new Date());
        }, 1000);
        
        // 清理函数：组件卸载时清除定时器
        return () => clearInterval(timer);
      }, []); // 空依赖数组：只在挂载时执行一次
      
      const formatTime = (date) => {
        return date.toLocaleTimeString('zh-CN', { 
          hour: '2-digit', minute: '2-digit', second: '2-digit' 
        });
      };
      
      return (
        <div className="counter-demo">
          <h2>示例5: 数字时钟 (useEffect + setInterval)</h2>
          <div className="clock-display">{formatTime(time)}</div>
          <p style={{color: '#666'}}>
            依赖数组为空 [] → 只在挂载时执行一次<br/>
            返回清理函数 → 卸载时清除定时器
          </p>
        </div>
      );
    }

    // 示例6: 鼠标位置
    function MousePosition() {
      const [position, setPosition] = useState({ x: 0, y: 0 });
      
      useEffect(() => {
        const handleMouseMove = (e) => {
          setPosition({ x: e.clientX, y: e.clientY });
        };
        
        window.addEventListener('mousemove', handleMouseMove);
        
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
        };
      }, []);
      
      return (
        <div className="mouse-pos">
          <h2>示例6: 鼠标位置追踪</h2>
          <p style={{fontSize: '2rem', color: '#667eea'}}>
            X: {position.x}, Y: {position.y}
          </p>
          <p style={{color: '#666', marginTop: 8}}>
            移动鼠标测试 (清除事件监听防止内存泄漏)
          </p>
        </div>
      );
    }

    // 示例7: useEffect 依赖数组
    function EffectDependencies() {
      const [count, setCount] = useState(0);
      const [text, setText] = useState('');
      const [logs, setLogs] = useState([]);
      
      const addLog = (msg) => {
        setLogs(prev => [...prev, `${new Date().toLocaleTimeString()}: ${msg}`].slice(-10));
      };
      
      // 1. 不写依赖数组：每次渲染都执行
      useEffect(() => {
        addLog('🟡 每次渲染都执行');
      });
      
      // 2. 空依赖数组：只执行一次（挂载时）
      useEffect(() => {
        addLog('🟢 只执行一次（挂载时）');
      }, []);
      
      // 3. 有依赖：依赖变化时执行
      useEffect(() => {
        addLog(`🔵 count 变化: ${count}`);
      }, [count]);
      
      // 4. 有依赖带清理
      useEffect(() => {
        addLog(`🟣 text 变化: "${text}"`);
        return () => addLog(`🔴 清理: "${text}"`);
      }, [text]);
      
      return (
        <div>
          <h2>示例7: useEffect 依赖数组</h2>
          <div style={{display: 'flex', gap: 8, marginBottom: 16}}>
            <button className="btn btn-primary" onClick={() => setCount(c => c + 1)}>
              Count: {count}
            </button>
            <input
              className="input-field"
              style={{flex: 1, margin: 0}}
              placeholder="输入 text..."
              value={text}
              onChange={(e) => setText(e.target.value)}
            />
          </div>
          <div className="effect-log">
            {logs.map((log, i) => <div key={i}>{log}</div>)}
          </div>
          <div style={{marginTop: 16, fontSize: '0.9rem', color: '#666'}}>
            <p>🟡 无依赖 → 每次渲染都执行（⚠️可能导致无限循环）</p>
            <p>🟢 [] → 只执行一次（挂载时）</p>
            <p>🔵 [count] → count 变化时执行</p>
            <p>🟣 [text] → 带清理函数，text 变化时先清理再执行</p>
          </div>
        </div>
      );
    }

    // 示例8: 模拟数据获取
    function DataFetching() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      
      const fetchData = async () => {
        setLoading(true);
        setError(null);
        
        try {
          // 模拟 API 请求
          await new Promise(resolve => setTimeout(resolve, 1000));
          
          // 模拟用户数据
          setData({
            name: '夜墨',
            role: '前端开发者',
            skills: ['React', 'Vue', 'TypeScript'],
            level: '🐈‍⬛ 赛博黑猫'
          });
        } catch (err) {
          setError('获取数据失败');
        } finally {
          setLoading(false);
        }
      };
      
      useEffect(() => {
        // 组件挂载时自动获取数据
        fetchData();
      }, []);
      
      return (
        <div>
          <h2>示例8: 模拟数据获取 (useEffect)</h2>
          <button 
            className="btn btn-primary" 
            onClick={fetchData}
            disabled={loading}
            style={{width: '100%', marginBottom: 16}}
          >
            {loading ? '加载中...' : '重新获取数据'}
          </button>
          
          {error && <p style={{color: 'red', padding: 12, background: '#fed7d7', borderRadius: 8}}>{error}</p>}
          
          {data && (
            <div className="user-card">
              <div className="user-avatar">{data.name[0]}</div>
              <div>
                <h3>{data.name} {data.level}</h3>
                <p style={{color: '#666'}}>{data.role}</p>
                <div style={{marginTop: 8}}>
                  {data.skills.map(skill => (
                    <span key={skill} style={{
                      display: 'inline-block', padding: '4px 8px', 
                      margin: '2px', background: '#e2e8f0', borderRadius: 4, fontSize: '0.8rem'
                    }}>
                      {skill}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // 主应用
    function App() {
      const [activeTab, setActiveTab] = useState(0);
      
      const demos = [
        <Counter key="1" />,
        <CounterFunctional key="2" />,
        <FormExample key="3" />,
        <TodoList key="4" />,
        <Clock key="5" />,
        <MousePosition key="6" />,
        <EffectDependencies key="7" />,
        <DataFetching key="8" />,
      ];
      
      const demoNames = [
        '计数器', '函数式更新', '表单', 'Todo', 
        '时钟', '鼠标追踪', 'Effect依赖', '数据获取'
      ];
      
      return (
        <div className="container">
          <h1>�Hooks - useState 与 useEffect</h1>
          
          <div className="demo-grid">
            {demos.map((demo, index) => (
              <div className="demo-card" key={index}>
                {demo}
              </div>
            ))}
          </div>
          
          <div className="demo-card" style={{marginTop: 20}}>
            <h2>📚 核心概念总结</h2>
            <div className="code-section">
              <h3>useState - 状态管理</h3>
              <div className="code-block">
{`// 基本语法
const [state, setState] = useState(initialValue);

// 函数式更新（推荐）
setState(prev => prev + 1);

// 多个状态
const [name, setName] = useState('');
const [age, setAge] = useState(0);`}
              </div>
            </div>
            
            <div className="code-section">
              <h3>useEffect - 副作用处理</h3>
              <div className="code-block">
{`// 1. 每次渲染都执行
useEffect(() => {
  console.log('每次渲染');
});

// 2. 只执行一次（挂载时）
useEffect(() => {
  const timer = setInterval(...);
  return () => clearInterval(timer); // 清理函数
}, []);

// 3. 依赖变化时执行
useEffect(() => {
  console.log('count 变化:', count);
}, [count]);`}
              </div>
            </div>
            
            <div className="code-section">
              <h3>⚠️ 常见误区</h3>
              <ul style={{color: '#666', lineHeight: 2}}>
                <li>❌ 不要在 useEffect 中直接修改状态（会导致无限循环）</li>
                <li>❌ 依赖数组要包含所有使用的响应式值</li>
                <li>❌ 不要忘记清理定时器、事件监听器</li>
                <li>✅ 使用函数式更新 setState(prev => ...)</li>
                <li>✅ 依赖数组为空 [] 用于一次性初始化</li>
              </ul>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
