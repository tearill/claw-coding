<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo List - DOM 操作实践</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: white;
      margin-bottom: 30px;
      font-size: 2rem;
    }

    .todo-app {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .input-section {
      display: flex;
      padding: 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
    }

    #todo-input {
      flex: 1;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.3s;
    }

    #todo-input:focus {
      border-color: #667eea;
    }

    #add-btn {
      margin-left: 10px;
      padding: 12px 24px;
      font-size: 16px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s, transform 0.1s;
    }

    #add-btn:hover {
      background: #5a6fd6;
    }

    #add-btn:active {
      transform: scale(0.98);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      padding: 15px 20px;
      background: #f8f9fa;
      border-bottom: 1px solid #e9ecef;
      font-size: 14px;
      color: #666;
    }

    .stats span {
      font-weight: 600;
      color: #333;
    }

    .todo-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      border-bottom: 1px solid #e9ecef;
      transition: background 0.2s;
    }

    .todo-item:hover {
      background: #f8f9fa;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      margin-right: 15px;
      cursor: pointer;
      accent-color: #667eea;
    }

    .todo-text {
      flex: 1;
      font-size: 16px;
      color: #333;
      word-break: break-word;
    }

    .delete-btn {
      padding: 6px 12px;
      font-size: 14px;
      background: #ff6b6b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .delete-btn:hover {
      background: #ee5a5a;
    }

    .empty-state {
      padding: 40px 20px;
      text-align: center;
      color: #999;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    /* 动画效果 */
    .todo-item {
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .todo-item.removing {
      animation: slideOut 0.3s ease forwards;
    }

    @keyframes slideOut {
      to {
        opacity: 0;
        transform: translateX(20px);
      }
    }

    /* 清空按钮 */
    .clear-section {
      padding: 15px 20px;
      background: #f8f9fa;
      border-top: 1px solid #e9ecef;
    }

    #clear-btn {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      background: transparent;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
    }

    #clear-btn:hover {
      background: #ff6b6b;
      color: white;
      border-color: #ff6b6b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 Todo List</h1>
    
    <div class="todo-app">
      <!-- 输入区域 -->
      <div class="input-section">
        <input 
          type="text" 
          id="todo-input" 
          placeholder="添加新的待办事项..."
          maxlength="100"
        >
        <button id="add-btn">添加</button>
      </div>

      <!-- 统计信息 -->
      <div class="stats">
        <span>总计: <span id="total-count">0</span> 项</span>
        <span>已完成: <span id="completed-count">0</span> 项</span>
        <span>未完成: <span id="pending-count">0</span> 项</span>
      </div>

      <!-- 待办列表 - 使用事件委托 -->
      <ul class="todo-list" id="todo-list">
        <!-- 动态生成的待办项 -->
      </ul>

      <!-- 清空按钮 -->
      <div class="clear-section">
        <button id="clear-btn">清空所有已完成</button>
      </div>
    </div>
  </div>

  <script>
    /**
     * Todo List 实践 - DOM 操作与事件处理
     * 展示：元素获取、内容操作、事件监听、事件委托、localStorage
     */

    // ===== 1. 获取 DOM 元素 =====
    const todoInput = document.querySelector('#todo-input')
    const addBtn = document.querySelector('#add-btn')
    const todoList = document.querySelector('#todo-list')
    const totalCount = document.querySelector('#total-count')
    const completedCount = document.querySelector('#completed-count')
    const pendingCount = document.querySelector('#pending-count')
    const clearBtn = document.querySelector('#clear-btn')

    // ===== 2. 状态管理 =====
    let todos = []

    // ===== 3. 初始化 =====
    function init() {
      // 从 localStorage 加载数据
      const stored = localStorage.getItem('todos')
      if (stored) {
        try {
          todos = JSON.parse(stored)
        } catch (e) {
          console.error('解析 localStorage 失败:', e)
          todos = []
        }
      }
      renderTodos()
    }

    // ===== 4. 渲染待办列表 =====
    function renderTodos() {
      // 使用 documentFragment 优化性能
      const fragment = document.createDocumentFragment()
      
      todoList.innerHTML = ''

      if (todos.length === 0) {
        // 空状态
        const emptyLi = document.createElement('li')
        emptyLi.className = 'empty-state'
        emptyLi.innerHTML = `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/>
          </svg>
          <p>暂无待办事项，添加一个吧！</p>
        `
        fragment.appendChild(emptyLi)
      } else {
        // 渲染每个待办项
        todos.forEach((todo, index) => {
          const li = document.createElement('li')
          li.className = `todo-item${todo.completed ? ' completed' : ''}`
          li.dataset.index = index
          
          // 使用 textContent 避免 XSS
          li.innerHTML = `
            <input type="checkbox" class="todo-checkbox" ${todo.completed ? 'checked' : ''}>
            <span class="todo-text"></span>
            <button class="delete-btn">删除</button>
          `
          
          // 安全地设置文本内容
          const textSpan = li.querySelector('.todo-text')
          textSpan.textContent = todo.text
          
          fragment.appendChild(li)
        })
      }

      todoList.appendChild(fragment)
      updateStats()
      saveToLocalStorage()
    }

    // ===== 5. 更新统计 =====
    function updateStats() {
      const total = todos.length
      const completed = todos.filter(t => t.completed).length
      const pending = total - completed

      totalCount.textContent = total
      completedCount.textContent = completed
      pendingCount.textContent = pending
    }

    // ===== 6. 保存到 localStorage =====
    function saveToLocalStorage() {
      try {
        localStorage.setItem('todos', JSON.stringify(todos))
      } catch (e) {
        console.error('保存到 localStorage 失败:', e)
      }
    }

    // ===== 7. 添加待办事项 =====
    function addTodo() {
      const text = todoInput.value.trim()
      
      if (!text) {
        alert('请输入待办事项内容')
        todoInput.focus()
        return
      }

      todos.push({
        text: text,
        completed: false,
        createdAt: Date.now()
      })

      todoInput.value = ''
      todoInput.focus()
      renderTodos()
    }

    // ===== 8. 切换完成状态 =====
    function toggleComplete(index) {
      if (todos[index]) {
        todos[index].completed = !todos[index].completed
        renderTodos()
      }
    }

    // ===== 9. 删除待办事项 =====
    function deleteTodo(index, element) {
      // 添加移除动画
      element.classList.add('removing')
      
      setTimeout(() => {
        todos.splice(index, 1)
        renderTodos()
      }, 300)
    }

    // ===== 10. 清空已完成 =====
    function clearCompleted() {
      todos = todos.filter(t => !t.completed)
      renderTodos()
    }

    // ===== 11. 事件处理 =====

    // 点击添加按钮
    addBtn.addEventListener('click', addTodo)

    // 回车添加
    todoInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        addTodo()
      }
    })

    // ===== 事件委托：列表项点击 =====
    // 这是性能优化的关键！只绑定一个事件处理函数
    todoList.addEventListener('click', (e) => {
      const target = e.target
      const li = target.closest('.todo-item')
      
      if (!li) return // 点击的是空状态区域
      
      const index = parseInt(li.dataset.index, 10)
      
      // 判断点击的是 checkbox 还是删除按钮
      if (target.classList.contains('todo-checkbox')) {
        toggleComplete(index)
      } else if (target.classList.contains('delete-btn')) {
        deleteTodo(index, li)
      }
    })

    // 清空已完成
    clearBtn.addEventListener('click', clearCompleted)

    // ===== 初始化 =====
    init()

    console.log('Todo List 初始化完成！')
    console.log('实践要点：')
    console.log('1. 使用 querySelector 获取元素')
    console.log('2. 使用 textContent 避免 XSS')
    console.log('3. 使用 DocumentFragment 优化性能')
    console.log('4. 使用事件委托处理动态列表')
    console.log('5. 使用 localStorage 持久化数据')
  </script>
</body>
</html>
