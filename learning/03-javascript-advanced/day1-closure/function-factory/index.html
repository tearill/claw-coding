<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>函数工厂 - 闭包应用</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 2rem;
    }
    
    h1 {
      color: white;
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }
    
    .factory-container {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    
    .factory-card {
      background: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }
    
    .factory-title {
      font-size: 1.1rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #f5576c;
    }
    
    .input-group {
      margin-bottom: 1rem;
    }
    
    .input-group label {
      display: block;
      font-size: 0.875rem;
      color: #666;
      margin-bottom: 0.25rem;
    }
    
    .input-group input {
      width: 100%;
      padding: 0.5rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 1rem;
    }
    
    .result {
      background: #f8f9fa;
      padding: 1rem;
      border-radius: 6px;
      margin-top: 1rem;
      font-family: 'Courier New', monospace;
      color: #d63384;
      font-weight: bold;
    }
    
    .description {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #fff3cd;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #856404;
    }
  </style>
</head>
<body>
  <h1>🏭 函数工厂 - 闭包应用</h1>
  
  <div class="factory-container">
    <!-- 加法器工厂 -->
    <div class="factory-card">
      <div class="factory-title">➕ 加法器工厂</div>
      <div class="input-group">
        <label>输入数字:</label>
        <input type="number" id="adderInput" value="10">
      </div>
      <button onclick="testAdder()">计算</button>
      <div class="result" id="adderResult">结果: -</div>
      <div class="description">
        createAdder(n) 返回一个函数，输入任意数字加上 n
      </div>
    </div>
    
    <!-- 乘法器工厂 -->
    <div class="factory-card">
      <div class="factory-title">✖️ 乘法器工厂</div>
      <div class="input-group">
        <label>输入数字:</label>
        <input type="number" id="multiplierInput" value="7">
      </div>
      <button onclick="testMultiplier()">计算</button>
      <div class="result" id="multiplierResult">结果: -</div>
      <div class="description">
        createMultiplier(n) 返回一个函数，输入任意数字乘以 n
      </div>
    </div>
    
    <!-- 日志工厂 -->
    <div class="factory-card">
      <div class="factory-title">📝 日志工厂</div>
      <div class="input-group">
        <label>前缀:</label>
        <input type="text" id="loggerPrefix" value="[INFO]">
      </div>
      <button onclick="testLogger()">记录日志</button>
      <div class="result" id="loggerResult">日志: -</div>
      <div class="description">
        createLogger(prefix) 返回一个日志函数，自动添加前缀
      </div>
    </div>
  </div>

  <script>
    // ========== 函数工厂实现 ==========
    
    // 1. 加法器工厂
    function createAdder(n) {
      // 闭包：记住 n 的值
      return function(num) {
        return num + n;
      };
    }
    
    // 2. 乘法器工厂
    function createMultiplier(n) {
      return function(num) {
        return num * n;
      };
    }
    
    // 3. 日志工厂
    function createLogger(prefix) {
      return function(message) {
        const timestamp = new Date().toLocaleTimeString();
        return `[${timestamp}] ${prefix} ${message}`;
      };
    }
    
    // 4. 验证器工厂
    function createValidator(type, min, max) {
      return function(value) {
        if (type === 'number') {
          return value >= min && value <= max;
        }
        if (type === 'string') {
          return value.length >= min && value.length <= max;
        }
        return false;
      };
    }
    
    // ========== 测试代码 ==========
    
    // 创建具体函数
    const add5 = createAdder(5);
    const add10 = createAdder(10);
    const double = createMultiplier(2);
    const triple = createMultiplier(3);
    const infoLogger = createLogger('[INFO]');
    const errorLogger = createLogger('[ERROR]');
    
    // 测试函数
    function testAdder() {
      const input = parseFloat(document.getElementById('adderInput').value);
      const result = add10(input);
      document.getElementById('adderResult').textContent = `结果: ${input} + 10 = ${result}`;
      console.log(`add10(${input}) = ${result}`);
    }
    
    function testMultiplier() {
      const input = parseFloat(document.getElementById('multiplierInput').value);
      const result = triple(input);
      document.getElementById('multiplierResult').textContent = `结果: ${input} × 3 = ${result}`;
      console.log(`triple(${input}) = ${result}`);
    }
    
    function testLogger() {
      const prefix = document.getElementById('loggerPrefix').value;
      const logger = createLogger(prefix);
      const result = logger('这是一个测试消息');
      document.getElementById('loggerResult').textContent = result;
      console.log(result);
    }
    
    // 初始化测试
    console.log('--- 函数工厂演示 ---');
    console.log('add5(3) =', add5(3));      // 8
    console.log('add10(3) =', add10(3));    // 13
    console.log('double(5) =', double(5));   // 10
    console.log('triple(5) =', triple(5));  // 15
    console.log(infoLogger('系统启动'));
    console.log(errorLogger('发生错误'));
  </script>
</body>
</html>
